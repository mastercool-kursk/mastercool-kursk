<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MasterCool HMI — Демонстрация Сайтов</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0a0f1e;
    font-family: 'Segoe UI', system-ui, -apple-system, 'Rajdhani', sans-serif;
    height: 100vh;
    overflow: hidden;
    color: white;
}

/* Главный контейнер — HMI-панель */
.hmi {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
}

/* Область iframe */
.iframe-stage {
    flex: 1 1 auto;
    position: relative;
    background: #030614;
    box-shadow: inset 0 0 50px rgba(0, 255, 255, 0.1);
    overflow: hidden;
}

.iframe-stage iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
    background: transparent;
    opacity: 0;
    transition: opacity 0.5s ease-in-out;
    pointer-events: none;
}

.iframe-stage iframe.active {
    opacity: 1;
    pointer-events: auto;
    z-index: 2;
}

/* Панель управления — HMI стиль */
.control-panel {
    background: rgba(8, 20, 40, 0.85);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-top: 1px solid rgba(0, 230, 255, 0.4);
    box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.8), 0 0 30px rgba(0, 230, 255, 0.4);
    padding: 1.2rem 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    flex-wrap: wrap;
    z-index: 100;
    position: relative;
}

/* Кнопки HMI */
.btn-hmi {
    background: rgba(20, 40, 60, 0.7);
    border: 1px solid #00e5ff;
    color: #e0f7fa;
    font-family: 'Orbitron', 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 1.1rem;
    padding: 0.9rem 2.2rem;
    border-radius: 50px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    backdrop-filter: blur(8px);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.2, 0.9, 0.3, 1.2);
    box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
    display: inline-flex;
    align-items: center;
    gap: 12px;
    min-width: 160px;
    justify-content: center;
    user-select: none;
}

.btn-hmi:hover {
    background: #00e5ff;
    color: #010514;
    border-color: #fff;
    box-shadow: 0 0 35px #00e5ff, 0 4px 20px rgba(0, 229, 255, 0.7);
    transform: translateY(-3px) scale(1.03);
}

.btn-hmi:active {
    transform: translateY(1px) scale(0.98);
    box-shadow: 0 0 20px #00e5ff;
}

.btn-hmi.pause {
    background: rgba(255, 170, 0, 0.2);
    border-color: #ffaa00;
    color: #ffd966;
    box-shadow: 0 0 20px rgba(255, 170, 0, 0.4);
}

.btn-hmi.pause:hover {
    background: #ffaa00;
    color: #010514;
    border-color: #fff;
    box-shadow: 0 0 45px #ffaa00;
}

/* Индикатор */
.indicator {
    font-family: 'Orbitron', monospace;
    font-size: 1.2rem;
    font-weight: 700;
    background: rgba(0, 0, 0, 0.5);
    padding: 0.6rem 1.8rem;
    border-radius: 60px;
    border: 1px solid rgba(0, 230, 255, 0.6);
    backdrop-filter: blur(4px);
    color: #b2f0ff;
    letter-spacing: 2px;
    box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
    margin: 0 1rem;
    min-width: 120px;
    text-align: center;
}

/* Точки-индикаторы */
.dot-container {
    display: flex;
    gap: 14px;
    align-items: center;
    margin: 0 1.5rem;
}

.dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.25);
    border: 2px solid rgba(0, 200, 255, 0.6);
    transition: all 0.3s ease;
    cursor: pointer;
    position: relative;
}

.dot::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: transparent;
    transition: all 0.3s ease;
}

.dot.active {
    background: #00f2ff;
    box-shadow: 0 0 25px cyan, 0 0 50px #00b8ff;
    border-color: white;
    transform: scale(1.4);
}

.dot.active::before {
    background: #000;
}

.dot:hover {
    background: rgba(0, 230, 250, 0.8);
    transform: scale(1.25);
}

/* Таймер прогресса */
.timer-glow {
    position: absolute;
    top: 0;
    left: 0;
    height: 4px;
    width: 0%;
    background: linear-gradient(90deg, #00e5ff, #aa5aff, #00e5ff);
    background-size: 200% 100%;
    box-shadow: 0 0 25px #00e5ff;
    transition: width 5s linear;
    z-index: 200;
    animation: gradientShift 2s ease infinite;
}

@keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}

/* Статус бар */
.status-bar {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(10px);
    padding: 0.5rem 1rem;
    border-radius: 20px;
    border: 1px solid rgba(0, 230, 255, 0.4);
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    color: #00e5ff;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 150;
}

.status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #00ff88;
    box-shadow: 0 0 10px #00ff88;
    animation: pulse 2s infinite;
}

.status-dot.paused {
    background: #ffaa00;
    box-shadow: 0 0 10px #ffaa00;
    animation: none;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

/* Адаптивность */
@media (max-width: 900px) {
    .btn-hmi { 
        font-size: 0.95rem; 
        padding: 0.7rem 1.5rem; 
        min-width: 130px; 
    }
    .indicator { 
        font-size: 1rem; 
        padding: 0.4rem 1.2rem; 
    }
    .control-panel { 
        gap: 1rem; 
        padding: 1rem; 
    }
}

@media (max-width: 600px) {
    .btn-hmi span:not(.icon) { 
        display: none; 
    }
    .btn-hmi { 
        min-width: auto; 
        padding: 0.9rem 1.4rem; 
    }
    .dot-container { 
        display: none; 
    }
    .indicator {
        min-width: 80px;
        font-size: 0.9rem;
    }
    .status-bar {
        top: 0.5rem;
        right: 0.5rem;
        font-size: 0.75rem;
        padding: 0.4rem 0.8rem;
    }
}

/* Иконки */
.icon {
    font-size: 1.4rem;
    line-height: 1;
}

/* Эффект загрузки */
.loading-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(3, 6, 20, 0.95);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    transition: opacity 0.5s ease;
}

.loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
}

.loading-spinner {
    width: 60px;
    height: 60px;
    border: 4px solid rgba(0, 229, 255, 0.3);
    border-top-color: #00e5ff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    box-shadow: 0 0 30px rgba(0, 229, 255, 0.5);
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
</head>

    <!-- Статус бар -->
    <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>

</div>

];

    const totalSlides = htmlSources.length;
    let currentIndex = 0;
    let isPlaying = true;
    let intervalId = null;
    const SWITCH_INTERVAL = 5000; // 5 секунд

    // --- Элементы управления ---
    const stage = document.getElementById('iframeStage');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const playPauseIcon = document.getElementById('playPauseIcon');
    const playPauseText = document.getElementById('playPauseText');
    const slideIndicator = document.getElementById('slideIndicator');
    const dotContainer = document.getElementById('dotContainer');
    const timerGlow = document.getElementById('timerGlow');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const loadingOverlay = document.getElementById('loadingOverlay');

    // Создаём iframe
    for (let i = 0; i < totalSlides; i++) {
        const iframe = document.createElement('iframe');
        iframe.setAttribute('srcdoc', htmlSources[i]);
        iframe.setAttribute('frameborder', '0');
        iframe.setAttribute('allowfullscreen', 'true');
        iframe.setAttribute('title', 'Сайт ' + (i + 1));
        iframe.classList.add('iframe-slide');
        if (i === 0) iframe.classList.add('active');
        stage.appendChild(iframe);
    }

    const slides = document.querySelectorAll('.iframe-slide');

    // --- Точки-индикаторы ---
    for (let i = 0; i < totalSlides; i++) {
        const dot = document.createElement('span');
        dot.classList.add('dot');
        dot.setAttribute('role', 'tab');
        dot.setAttribute('aria-label', 'Перейти к слайду ' + (i + 1));
        dot.dataset.index = i;
        dotContainer.appendChild(dot);
    }

    const dots = document.querySelectorAll('.dot');

    function updateDots(index) {
        dots.forEach((dot, i) => {
            if (i === index) {
                dot.classList.add('active');
                dot.setAttribute('aria-selected', 'true');
            } else {
                dot.classList.remove('active');
                dot.setAttribute('aria-selected', 'false');
            }
        });
    }

    // --- Переход к слайду ---
    function goToSlide(index, resetTimer = true) {
        if (index < 0) index = totalSlides - 1;
        if (index >= totalSlides) index = 0;

        slides.forEach((slide, i) => {
            slide.classList.toggle('active', i === index);
        });

        currentIndex = index;
        slideIndicator.innerText = (index + 1) + ' / ' + totalSlides;
        updateDots(index);

        if (resetTimer) {
            resetAutoPlay();
        }
    }

    // --- Вперёд/Назад ---
    function nextSlide() {
        goToSlide(currentIndex + 1);
    }

    function prevSlide() {
        goToSlide(currentIndex - 1);
    }

    // --- Автопереключение ---
    function startAutoPlay() {
        if (intervalId) clearInterval(intervalId);
        intervalId = setInterval(() => {
            if (isPlaying) {
                nextSlide();
            }
        }, SWITCH_INTERVAL);
        startTimerAnimation();
        updateStatus(true);
    }

    function stopAutoPlay() {
        if (intervalId) {
            clearInterval(intervalId);
            intervalId = null;
        }
        resetTimerAnimation();
        updateStatus(false);
    }

    function resetAutoPlay() {
        if (isPlaying) {
            stopAutoPlay();
            startAutoPlay();
        } else {
            resetTimerAnimation();
        }
    }

    // --- Анимация таймера ---
    function startTimerAnimation() {
        timerGlow.style.transition = 'none';
        timerGlow.style.width = '0%';
        void timerGlow.offsetWidth; // force reflow
        timerGlow.style.transition = 'width ' + SWITCH_INTERVAL + 'ms linear';
        timerGlow.style.width = '100%';
    }

    function resetTimerAnimation() {
        timerGlow.style.transition = 'none';
        timerGlow.style.width = '0%';
    }

    // --- Статус бар ---
    function updateStatus(playing) {
        if (playing) {
            statusDot.classList.remove('paused');
            statusText.innerText = 'АВТО';
        } else {
            statusDot.classList.add('paused');
            statusText.innerText = 'ПАУЗА';
        }
    }

    // --- Пауза / Воспроизведение ---
    function togglePlayPause() {
        isPlaying = !isPlaying;
        if (isPlaying) {
            playPauseIcon.innerText = '⏸️';
            playPauseText.innerText = 'Пауза';
            playPauseBtn.classList.remove('pause');
            playPauseBtn.setAttribute('aria-label', 'Пауза');
            startAutoPlay();
        } else {
            playPauseIcon.innerText = '▶️';
            playPauseText.innerText = 'Старт';
            playPauseBtn.classList.add('pause');
            playPauseBtn.setAttribute('aria-label', 'Старт');
            stopAutoPlay();
        }
    }

    // --- Инициализация ---
    function init() {
        // Скрываем загрузку после небольшой задержки
        setTimeout(() => {
            loadingOverlay.classList.add('hidden');
        }, 1000);

        goToSlide(0, false);
        startAutoPlay();

        prevBtn.addEventListener('click', () => {
            prevSlide();
        });

        nextBtn.addEventListener('click', () => {
            nextSlide();
        });

        playPauseBtn.addEventListener('click', togglePlayPause);

        // Клавиатурное управление
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevSlide();
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                nextSlide();
            } else if (e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                togglePlayPause();
            }
        });

        // Клик по точкам
        dots.forEach(dot => {
            dot.addEventListener('click', (e) => {
                const idx = parseInt(e.target.dataset.index, 10);
                goToSlide(idx);
            });
        });

        // Обновление статуса при загрузке
        updateStatus(true);
    }

    // Запуск
    init();
})();
</script>
